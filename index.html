<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManV Triage Simulator – VOR-Sichtung</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sk1: #CC0000;
    --sk2: #FFCC00;
    --sk-weiss: #F5F5F5;
    --sk-tot: #444444;
    --bg: #0d1b2a;
    --bg-card: #1b2d45;
    --bg-surface: #162236;
    --text: #e0e6ed;
    --text-muted: #8899aa;
    --accent: #4cc9f0;
    --correct: #2dc653;
    --wrong: #e5383b;
    --border: #2a3f5a;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
  }

  .header {
    text-align: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .header-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(76,201,240,0.1);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .header h1 span { color: var(--sk1); }
  .header-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .patient-banner {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
  }
  .patient-banner-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .step-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-weight: 800;
    font-size: 0.9rem;
    color: #fff;
    flex-shrink: 0;
  }
  .step-badge.a { background: var(--sk1); }
  .step-badge.b { background: #e07000; }
  .step-badge.c { background: #b5179e; }
  .step-badge.d { background: #7209b7; }
  .step-badge.info { background: var(--accent); font-size: 1.1rem; }

  .question-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .question-text {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.4;
  }
  .question-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: auto;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-ja {
    background: var(--correct);
    color: #fff;
    box-shadow: 0 4px 14px rgba(45,198,83,0.3);
  }
  .btn-nein {
    background: var(--wrong);
    color: #fff;
    box-shadow: 0 4px 14px rgba(229,56,59,0.3);
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 4px 14px rgba(76,201,240,0.25);
  }
  .btn-secondary {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-start { padding: 18px; font-size: 1.15rem; }

  .feedback-banner {
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    font-weight: 800;
    font-size: 1.2rem;
  }
  .feedback-banner.correct {
    background: rgba(45,198,83,0.15);
    color: var(--correct);
    border: 2px solid var(--correct);
  }
  .feedback-banner.wrong {
    background: rgba(229,56,59,0.15);
    color: var(--wrong);
    border: 2px solid var(--wrong);
  }
  .feedback-explain {
    font-size: 0.9rem;
    line-height: 1.55;
  }
  .feedback-explain strong { color: #fff; }

  .sk-badge {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.05em;
  }
  .sk-badge.sk1 { background: var(--sk1); color: #fff; }
  .sk-badge.sk2 { background: var(--sk2); color: #000; }
  .sk-badge.weiss { background: var(--sk-weiss); color: #333; border: 2px solid #ccc; }
  .sk-badge.tot { background: var(--sk-tot); color: #fff; }

  .result-score {
    text-align: center;
    padding: 20px;
    background: var(--bg-surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .result-score .big {
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .result-score .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .result-item {
    padding: 12px;
    border-radius: 8px;
    background: var(--bg-surface);
    border-left: 4px solid var(--correct);
    font-size: 0.85rem;
    line-height: 1.4;
  }
  .result-item.error { border-left-color: var(--wrong); }
  .result-item .ri-title { font-weight: 700; margin-bottom: 4px; }
  .result-item .ri-detail { color: var(--text-muted); }

  .error-list-item {
    padding: 8px 12px;
    border-radius: 6px;
    background: rgba(229,56,59,0.08);
    border: 1px solid rgba(229,56,59,0.2);
    font-size: 0.82rem;
    line-height: 1.4;
  }
  .error-list-item .eli-q { font-weight: 600; }
  .error-list-item .eli-d { color: var(--text-muted); margin-top: 2px; }

  .info-banner {
    background: rgba(76,201,240,0.08);
    border: 1px solid rgba(76,201,240,0.2);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .info-banner strong { color: var(--accent); }

  .feature-list { display: flex; flex-direction: column; gap: 10px; }
  .feature-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--text-muted); }
  .feature-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .flatterband {
    background: repeating-linear-gradient(-45deg, var(--sk2), var(--sk2) 12px, #000 12px, #000 24px);
    height: 8px;
    border-radius: 4px;
    margin: 4px 0;
  }

  /* ── Prototype Popup ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .modal-icon {
    font-size: 2.4rem;
    line-height: 1;
  }
  .modal-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--sk2);
  }
  .modal-text {
    font-size: 0.85rem;
    line-height: 1.55;
    color: var(--text-muted);
  }

  .spacer { flex: 1; }
  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); }
  .text-sm { font-size: 0.8rem; }
</style>
</head>
<body>
<div id="app"></div>

<div id="protoModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon">&#9888;&#65039;</div>
    <div class="modal-title">Prototyp – v0.1</div>
    <div class="modal-text">
      Dieses Tool befindet sich in einer fr&#252;hen Entwicklungsphase.<br><br>
      Inhalte, Algorithmus-Logik und Darstellung <strong style="color:var(--text);">k&#246;nnen Fehler enthalten</strong> und sind noch nicht abschlie&#223;end gepr&#252;ft.<br><br>
      Fehler gerne als Issue auf GitHub melden.
    </div>
    <button class="btn btn-primary" onclick="document.getElementById('protoModal').classList.add('hidden')">Verstanden</button>
  </div>
</div>
<script>
/* ═══════════════════════════════════════════════════════
   ManV Triage Simulator – VOR-Sichtung · v0.1
   ═══════════════════════════════════════════════════════ */

const szenarien = [
  {
    id: 1,
    beschreibung: "34-j\u00e4hriger Mann, steht aufrecht am Stra\u00dfenrand und h\u00e4lt sich den linken Arm. Er ist ansprechbar und orientiert.",
    antworten: { tourniquet: false, gehfaehig: true, todeszeichen: false, stridor: false, atemweg_zu: false, path_af: false, blutung: false, kein_radialis: false, kein_ansprechen: false },
    korrekte_sk: "weiss",
    begruendung: "Patient ist gehf\u00e4hig \u2192 PAK wei\u00df, Weiterleitung zur Sammelstelle. Die VOR-Sichtung endet beim ersten zutreffenden Punkt."
  },
  {
    id: 2,
    beschreibung: "45-j\u00e4hrige Frau, liegt bewusstlos am Boden. Atmet regelm\u00e4\u00dfig. Kein Radialispuls tastbar (10 Sek. gepr\u00fcft).",
    antworten: { tourniquet: false, gehfaehig: false, todeszeichen: false, stridor: false, atemweg_zu: false, path_af: false, blutung: false, kein_radialis: true, kein_ansprechen: true },
    korrekte_sk: "sk1",
    begruendung: "Kein Radialispuls tastbar \u2192 SK 1. Beim ersten zutreffenden SK-1-Kriterium wird gestoppt (C-Problem: fehlender Radialispuls)."
  },
  {
    id: 3,
    beschreibung: "52-j\u00e4hriger Mann, nicht gehf\u00e4hig, schreit vor Schmerzen. Massive arterielle Blutung am rechten Oberschenkel.",
    antworten: { tourniquet: true, gehfaehig: false, todeszeichen: false, stridor: false, atemweg_zu: false, path_af: false, blutung: true, kein_radialis: false, kein_ansprechen: false },
    korrekte_sk: "sk1",
    begruendung: "Lebensbedrohliche Blutung \u2192 SK 1. Zus\u00e4tzlich: Tourniquet als Sofortma\u00dfnahme bei lebensbedrohlicher Extremit\u00e4tenblutung."
  },
  {
    id: 4,
    beschreibung: "\u00c4ltere Frau, liegt regungslos. Totenstarre erkennbar, livide Totenflecken am R\u00fccken sichtbar.",
    antworten: { tourniquet: false, gehfaehig: false, todeszeichen: true, stridor: false, atemweg_zu: false, path_af: false, blutung: false, kein_radialis: false, kein_ansprechen: false },
    korrekte_sk: "tot",
    begruendung: "Sichere Todeszeichen (Totenstarre + Totenflecken) \u2192 Kategorie \u201atot\u2018. Counterz\u00e4hlung, zeitnah abdecken, PAK auf tot stellen. \u00c4rztliche Leichenschau erforderlich."
  },
  {
    id: 5,
    beschreibung: "8-j\u00e4hriges Kind, wach und ansprechbar, Sch\u00fcrfwunden. Atemfrequenz gez\u00e4hlt: 48/min.",
    antworten: { tourniquet: false, gehfaehig: false, todeszeichen: false, stridor: false, atemweg_zu: false, path_af: true, blutung: false, kein_radialis: false, kein_ansprechen: false },
    korrekte_sk: "sk1",
    begruendung: "Pathologische Atemfrequenz bei Kindern: AF > 40/min \u2192 SK 1. Grenzwerte: Kinder (< 15 oder > 40), Erwachsene (< 10 oder > 30)!"
  },
  {
    id: 6,
    beschreibung: "38-j\u00e4hriger Mann, liegt am Boden, ansprechbar und orientiert. Offene Unterschenkelfraktur rechts, keine Blutungsproblematik. AF 16/min, Radialispuls tastbar.",
    antworten: { tourniquet: false, gehfaehig: false, todeszeichen: false, stridor: false, atemweg_zu: false, path_af: false, blutung: false, kein_radialis: false, kein_ansprechen: false },
    korrekte_sk: "sk2",
    begruendung: "Keiner der SK-1-Punkte zutreffend (kein A/B/C/D-Problem) \u2192 SK 2 (aufgeschobene Behandlung). Patient verletzt, aber nicht unmittelbar vital gef\u00e4hrdet."
  },
  {
    id: 7,
    beschreibung: "30-j\u00e4hrige Frau, aus Brandraum gerettet. Ru\u00dfspuren im Gesicht, pfeifendes/stridor\u00f6ses Atemger\u00e4usch h\u00f6rbar.",
    antworten: { tourniquet: false, gehfaehig: false, todeszeichen: false, stridor: true, atemweg_zu: false, path_af: false, blutung: false, kein_radialis: false, kein_ansprechen: false },
    korrekte_sk: "sk1",
    begruendung: "Inhalationstrauma mit Stridor \u2192 SK 1 (A-Problem). Stridor weist auf Schwellung der oberen Atemwege hin \u2013 akute Erstickungsgefahr!"
  },
  {
    id: 8,
    beschreibung: "60-j\u00e4hriger Mann, liegt unterk\u00fchlt in einer Pf\u00fctze. Reagiert kaum. Atemfrequenz sehr langsam: 7/min.",
    antworten: { tourniquet: false, gehfaehig: false, todeszeichen: false, stridor: false, atemweg_zu: false, path_af: true, blutung: false, kein_radialis: false, kein_ansprechen: true },
    korrekte_sk: "sk1",
    begruendung: "Pathologische Atemfrequenz: AF 7/min (< 10 bei Erwachsenen) \u2192 SK 1 (B-Problem). Patient ist vital gef\u00e4hrdet."
  }
];

const schritte = [
  { key: "tourniquet", type: "yesno", badge: "c", badgeText: "C",
    frage: "Lebensbedrohliche Extremit\u00e4tenblutung erkennbar?", hinweis: "Falls ja \u2192 sofort Tourniquet anlegen! Zeit notieren.\nSofortma\u00dfnahme VOR der eigentlichen Sichtung.", endetSichtung: false },
  { key: "gehfaehig", type: "yesno", badge: "info", badgeText: "?",
    frage: "Ist der Patient gehf\u00e4hig?", hinweis: "Kann der Patient selbstst\u00e4ndig gehen?\n\u2192 Wenn ja: PAK wei\u00df, Sammelstelle.", endetSichtung: true, endetBeiJa: true, ergebnis: "weiss" },
  { key: "todeszeichen", type: "yesno", badge: "info", badgeText: "\u2020",
    frage: "Sind sichere Todeszeichen vorhanden?", hinweis: "Totenstarre, Totenflecken, mit dem Leben nicht vereinbare Verletzungen.\n\u2192 Counterz\u00e4hlung, abdecken, Leichenschau erforderlich.", endetSichtung: true, endetBeiJa: true, ergebnis: "tot" },
  { key: "stridor", type: "yesno", badge: "a", badgeText: "A",
    frage: "Inhalationstrauma mit Stridor?", hinweis: "Pfeifendes Atemger\u00e4usch nach Rauchgas-/Hitzeexposition?\n\u2192 Schwellung der oberen Atemwege = akute Gefahr.", endetSichtung: true, endetBeiJa: true, ergebnis: "sk1" },
  { key: "atemweg_zu", type: "yesno", badge: "a", badgeText: "A",
    frage: "Offenhalten des Atemwegs erforderlich?", hinweis: "Verlegter Atemweg, Gurgelger\u00e4usche, Schnarchen bei Bewusstlosigkeit?", endetSichtung: true, endetBeiJa: true, ergebnis: "sk1" },
  { key: "path_af", type: "yesno", badge: "b", badgeText: "B",
    frage: "Pathologische Atemfrequenz?", hinweis: "Erwachsene: AF < 10 oder > 30/min\nKleinkinder: AF < 15 oder > 40/min", endetSichtung: true, endetBeiJa: true, ergebnis: "sk1" },
  { key: "blutung", type: "yesno", badge: "c", badgeText: "C",
    frage: "Lebensbedrohliche Blutung?", hinweis: "Massive Blutung, die nicht durch einfachen Druckverband kontrollierbar ist?", endetSichtung: true, endetBeiJa: true, ergebnis: "sk1" },
  { key: "kein_radialis", type: "yesno", badge: "c", badgeText: "C",
    frage: "Kein Radialispuls tastbar?", hinweis: "Untersuchungsdauer: 10 Sekunden.\nKein tastbarer Radialispuls \u2259 RR < 80 mmHg \u2192 Schockzeichen.", endetSichtung: true, endetBeiJa: true, ergebnis: "sk1" },
  { key: "kein_ansprechen", type: "yesno", badge: "d", badgeText: "D",
    frage: "Keine gezielte Reaktion auf Ansprache?", hinweis: "Patient reagiert nicht gezielt auf direkte Ansprache (WASB < W).", endetSichtung: true, endetBeiJa: true, ergebnis: "sk1" }
];

const TOTAL_STEPS = schritte.length;

const SK_META = {
  sk1:   { label: "SK 1", css: "sk1" },
  sk2:   { label: "SK 2", css: "sk2" },
  weiss: { label: "PAK wei\u00df", css: "weiss" },
  tot:   { label: "Tot", css: "tot" }
};

function skBadge(sk, small) {
  var m = SK_META[sk] || { label: sk, css: "" };
  var s = small ? "font-size:0.7rem;padding:2px 8px;" : "";
  return "<span class=\"sk-badge " + m.css + "\" style=\"" + s + "\">" + m.label + "</span>";
}

function esc(s) { return s.replace(/\n/g, "<br>"); }

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ── State ──
var state = {
  screen: "start",
  pool: [],
  scenario: null,
  stepIdx: 0,
  answers: [],
  userSK: null,
  results: []
};

var app = document.getElementById("app");

function render() {
  var fn = {
    start: renderStart,
    intro: renderIntro,
    step: renderStep,
    result: renderResult,
    summary: renderSummary
  };
  (fn[state.screen] || renderStart)();
  window.scrollTo(0, 0);
}

function renderStart() {
  app.innerHTML =
    "<div class=\"header\">" +
      "<div class=\"header-badge\">Trainingsmodus</div>" +
      "<h1>ManV <span>Triage</span> Simulator</h1>" +
      "<div class=\"header-sub\">VOR-Sichtung </div>" +
    "</div>" +
    "<div class=\"card\">" +
      "<div class=\"info-banner\">" +
        "<strong>VOR-Sichtung \u00fcben</strong><br>" +
        "Durchlaufe den Vorsichtungsalgorithmus Schritt f\u00fcr Schritt. " +
        "Die Sichtung endet beim <strong>ersten zutreffenden Punkt</strong> \u2013 pro Patient nur 1 Entscheidung." +
      "</div>" +
      "<div class=\"flatterband\"></div>" +
      "<div class=\"feature-list\">" +
        "<div class=\"feature-item\"><div class=\"feature-dot\"></div> 8 realistische Patientenszenarien</div>" +
        "<div class=\"feature-item\"><div class=\"feature-dot\"></div> Auswertung nach abgeschlossener Sichtung</div>" +
        "<div class=\"feature-item\"><div class=\"feature-dot\"></div> Detaillierte Fehleranalyse am Ende</div>" +
      "</div>" +
      "<div class=\"spacer\"></div>" +
      "<button class=\"btn btn-primary btn-start\" onclick=\"startTraining()\">Training starten</button>" +
      "<div class=\"text-center text-muted text-sm\" style=\"margin-top:4px;\">Prototyp v0.1</div>" +
    "</div>";
}

function startTraining() {
  state.pool = shuffle(szenarien);
  state.results = [];
  nextScenario();
}

function nextScenario() {
  if (state.pool.length === 0) { state.screen = "summary"; render(); return; }
  state.scenario = state.pool.shift();
  state.stepIdx = 0;
  state.answers = [];
  state.userSK = null;
  state.screen = "intro";
  render();
}

function renderIntro() {
  var s = state.scenario;
  var num = szenarien.length - state.pool.length;
  app.innerHTML =
    "<div class=\"header\">" +
      "<div class=\"header-badge\">VOR-Sichtung</div>" +
      "<h1>Patient <span>" + num + "</span> von " + szenarien.length + "</h1>" +
    "</div>" +
    "<div class=\"card\">" +
      "<div class=\"patient-banner-label\">Einsatzmeldung</div>" +
      "<div class=\"patient-banner\">" + s.beschreibung + "</div>" +
      "<div class=\"flatterband\"></div>" +
      "<div class=\"info-banner\">Gehe den VOR-Sichtungsalgorithmus Schritt f\u00fcr Schritt durch. Dein Feedback erh\u00e4ltst du am Ende der Sichtung.</div>" +
      "<div class=\"spacer\"></div>" +
      "<button class=\"btn btn-primary btn-start\" onclick=\"beginSteps()\">VOR-Sichtung beginnen</button>" +
    "</div>";
}

function beginSteps() {
  state.stepIdx = 0;
  state.screen = "step";
  render();
}

function renderStep() {
  var step = schritte[state.stepIdx];
  var s = state.scenario;
  var num = szenarien.length - state.pool.length;
  var pct = ((state.stepIdx + 1) / TOTAL_STEPS * 100).toFixed(0);

  var btns;
  if (step.type === "info") {
    btns = "<div class=\"btn-row\"><button class=\"btn btn-primary\" onclick=\"infoNext()\">" + step.buttonText + "</button></div>";
  } else {
    btns = "<div class=\"btn-row\">" +
      "<button class=\"btn btn-ja\" onclick=\"answer(true)\">Ja</button>" +
      "<button class=\"btn btn-nein\" onclick=\"answer(false)\">Nein</button>" +
    "</div>";
  }

  app.innerHTML =
    "<div class=\"header\">" +
      "<div class=\"header-badge\">Patient " + num + "/" + szenarien.length + "</div>" +
      "<h1 style=\"font-size:1rem;\">VOR-Sichtung</h1>" +
    "</div>" +
    "<div class=\"patient-banner\">" +
      "<div class=\"patient-banner-label\">Patient</div>" +
      s.beschreibung +
    "</div>" +
    "<div class=\"progress-wrap\">" +
      "<span>Schritt " + (state.stepIdx + 1) + "/" + TOTAL_STEPS + "</span>" +
      "<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:" + pct + "%\"></div></div>" +
    "</div>" +
    "<div class=\"card\">" +
      "<div class=\"question-row\">" +
        "<div class=\"step-badge " + step.badge + "\">" + step.badgeText + "</div>" +
        "<div>" +
          "<div class=\"question-text\">" + step.frage + "</div>" +
          "<div class=\"question-hint\">" + esc(step.hinweis) + "</div>" +
        "</div>" +
      "</div>" +
      "<div class=\"spacer\"></div>" +
      btns +
    "</div>";
}

function infoNext() {
  state.stepIdx++;
  render();
}

function answer(yes) {
  var step = schritte[state.stepIdx];
  var correct = state.scenario.antworten[step.key];

  state.answers.push({
    key: step.key,
    frage: step.frage,
    badge: step.badge,
    badgeText: step.badgeText,
    userAnswer: yes,
    correctAnswer: correct
  });

  // Tourniquet never ends sichtung
  if (!step.endetSichtung) {
    advance();
    return;
  }

  // User said Ja on ending step → assign this SK and finish
  if (yes) {
    state.userSK = step.ergebnis;
    finish();
    return;
  }

  // Nein → continue
  advance();
}

function advance() {
  if (state.stepIdx >= schritte.length - 1) {
    state.userSK = "sk2";
    finish();
    return;
  }
  state.stepIdx++;
  render();
}

function finish() {
  var s = state.scenario;
  var errors = state.answers.filter(function(a) { return a.userAnswer !== a.correctAnswer; });

  state.results.push({
    scenario: s,
    userSK: state.userSK,
    correctSK: s.korrekte_sk,
    correct: state.userSK === s.korrekte_sk,
    errors: errors
  });

  state.screen = "result";
  render();
}

function renderResult() {
  var r = state.results[state.results.length - 1];
  var s = r.scenario;
  var num = szenarien.length - state.pool.length;

  var banner = r.correct
    ? "<div class=\"feedback-banner correct\">\u2713 Korrekt eingestuft</div>"
    : "<div class=\"feedback-banner wrong\">\u2717 Falsch eingestuft</div>";

  var skHTML = "<div class=\"text-center\">" +
    "<div class=\"text-muted text-sm\" style=\"margin-bottom:8px;\">Deine Einstufung</div>" +
    skBadge(r.userSK) + "</div>";

  if (!r.correct) {
    skHTML += "<div class=\"text-center\">" +
      "<div class=\"text-muted text-sm\" style=\"margin-bottom:8px;\">Korrekte Einstufung</div>" +
      skBadge(r.correctSK) + "</div>";
  }

  var errHTML = "";
  if (r.errors.length > 0) {
    errHTML = "<div style=\"font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;\">Fehler bei der Sichtung</div>";
    r.errors.forEach(function(e) {
      errHTML += "<div class=\"error-list-item\">" +
        "<div class=\"eli-q\">" + e.frage + "</div>" +
        "<div class=\"eli-d\">Deine Antwort: " + (e.userAnswer ? "Ja" : "Nein") + " \u00b7 Richtig: " + (e.correctAnswer ? "Ja" : "Nein") + "</div>" +
      "</div>";
    });
  }

  var nextLabel = state.pool.length > 0 ? "N\u00e4chster Patient \u2192" : "Zur Auswertung \u2192";

  app.innerHTML =
    "<div class=\"header\">" +
      "<div class=\"header-badge\">Patient " + num + "/" + szenarien.length + "</div>" +
      "<h1 style=\"font-size:1rem;\">Ergebnis VOR-Sichtung</h1>" +
    "</div>" +
    "<div class=\"patient-banner\">" +
      "<div class=\"patient-banner-label\">Patient</div>" +
      s.beschreibung +
    "</div>" +
    "<div class=\"card\" style=\"gap:12px;\">" +
      banner + skHTML +
      "<div class=\"flatterband\"></div>" +
      "<div class=\"info-banner\"><strong>Flatterband anbringen</strong> \u2013 Ort: 1. Oberarm rechts, sonst Oberarm links. Dokumentation VOR-Sichtung abschlie\u00dfen.</div>" +
      "<div class=\"feedback-explain\"><strong>Begr\u00fcndung:</strong> " + s.begruendung + "</div>" +
      errHTML +
      "<div class=\"spacer\"></div>" +
      "<button class=\"btn btn-primary\" onclick=\"nextScenario()\">" + nextLabel + "</button>" +
    "</div>";
}

function renderSummary() {
  var total = state.results.length;
  var correct = state.results.filter(function(r) { return r.correct; }).length;
  var pct = Math.round(correct / total * 100);

  var counts = { sk1: 0, sk2: 0, weiss: 0, tot: 0 };
  state.results.forEach(function(r) { if (counts[r.correctSK] !== undefined) counts[r.correctSK]++; });

  var msg;
  if (pct === 100) msg = "Hervorragend! Alle Patienten korrekt eingestuft.";
  else if (pct >= 75) msg = "Gutes Ergebnis! Einzelne Punkte solltest du noch vertiefen.";
  else if (pct >= 50) msg = "Solide Basis, aber es gibt noch Verbesserungspotenzial.";
  else msg = "Den Algorithmus solltest du noch intensiv \u00fcben. Wiederholung hilft!";

  var list = "";
  state.results.forEach(function(r, i) {
    var icon = r.correct ? "\u2713" : "\u2717";
    var cls = r.correct ? "" : " error";
    var desc = r.scenario.beschreibung;
    if (desc.length > 55) desc = desc.substring(0, 55) + "\u2026";
    var det = "Korrekt: " + skBadge(r.correctSK, true);
    if (!r.correct) det += " \u00b7 Deine Antwort: " + skBadge(r.userSK, true);
    list += "<div class=\"result-item" + cls + "\">" +
      "<div class=\"ri-title\">" + icon + " Patient " + (i + 1) + ": " + desc + "</div>" +
      "<div class=\"ri-detail\">" + det + "</div></div>";
  });

  app.innerHTML =
    "<div class=\"header\">" +
      "<div class=\"header-badge\">Auswertung</div>" +
      "<h1>VOR-Sichtung <span>abgeschlossen</span></h1>" +
    "</div>" +
    "<div class=\"card\" style=\"gap:12px;\">" +
      "<div class=\"result-score\">" +
        "<div class=\"big\">" + correct + "/" + total + "</div>" +
        "<div class=\"label\">Patienten korrekt eingestuft (" + pct + "%)</div>" +
      "</div>" +
      "<div class=\"feedback-explain\" style=\"text-align:center;\">" + msg + "</div>" +
      "<div class=\"info-banner\">" +
        "<strong>SK-Verteilung (korrekt):</strong><br>" +
        "SK 1: " + counts.sk1 + " \u00b7 SK 2: " + counts.sk2 + " \u00b7 Wei\u00df: " + counts.weiss + " \u00b7 Tot: " + counts.tot +
      "</div>" +
      "<div style=\"font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;\">Ergebnisse im Detail</div>" +
      list +
      "<div class=\"btn-row\" style=\"margin-top:8px;\">" +
        "<button class=\"btn btn-primary\" onclick=\"startTraining()\">Nochmal \u00fcben</button>" +
        "<button class=\"btn btn-secondary\" onclick=\"state.screen='start';render();\">Startseite</button>" +
      "</div>" +
    "</div>";
}

render();
</script>
</body>
</html>
